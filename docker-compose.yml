services:
  db:
    image: postgres:16-alpine
    container_name: construbrito_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: construbrito
      POSTGRES_USER: construbrito
      POSTGRES_PASSWORD: construbrito
    ports:
      - "5432:5432"
    volumes:
      - construbrito_pgdata:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U construbrito -d construbrito"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  construbrito_pgdata:
